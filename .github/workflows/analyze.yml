name: PyVizAST Code Analyzer

on:
  workflow_call:
    inputs:
      path:
        description: 'Directory to analyze'
        required: false
        default: '.'
        type: string
      fail-on-issues:
        description: 'Fail if issues found'
        required: false
        default: false
        type: boolean

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Analyze code
      id: analyze
      env:
        ANALYZE_PATH: ${{ inputs.path }}
      run: |
        python -c "
        import os
        import json
        import ast
        
        path = os.environ.get('ANALYZE_PATH', '.')
        results = {
            'total_files': 0,
            'total_lines': 0,
            'issues': [],
            'metrics': {}
        }
        
        for root, dirs, files in os.walk(path):
            dirs[:] = [d for d in dirs if not d.startswith('.') and d not in ['node_modules', '__pycache__', 'venv', 'env']]
            
            for file in files:
                if file.endswith('.py'):
                    filepath = os.path.join(root, file)
                    results['total_files'] += 1
                    
                    try:
                        with open(filepath, 'r', encoding='utf-8') as f:
                            content = f.read()
                            lines = content.splitlines()
                            results['total_lines'] += len(lines)
                        
                        tree = ast.parse(content)
                        
                        for node in ast.walk(tree):
                            if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                                if len(node.body) > 50:
                                    results['issues'].append({
                                        'file': filepath,
                                        'line': node.lineno,
                                        'type': 'long_function',
                                        'message': f\"Function '{node.name}' has {len(node.body)} lines\"
                                    })
                            elif isinstance(node, ast.ClassDef):
                                methods = [n for n in node.body if isinstance(n, (ast.FunctionDef, ast.AsyncFunctionDef))]
                                if len(methods) > 15:
                                    results['issues'].append({
                                        'file': filepath,
                                        'line': node.lineno,
                                        'type': 'large_class',
                                        'message': f\"Class '{node.name}' has {len(methods)} methods\"
                                    })
                                    
                    except SyntaxError as e:
                        results['issues'].append({
                            'file': filepath,
                            'line': e.lineno or 0,
                            'type': 'syntax_error',
                            'message': str(e)
                        })
        
        print(json.dumps(results, indent=2))
        
        with open('analysis-results.json', 'w') as f:
            json.dump(results, f, indent=2)
        
        print('\n=== PyVizAST Analysis Summary ===')
        print(f\"Files analyzed: {results['total_files']}\")
        print(f\"Total lines: {results['total_lines']}\")
        print(f\"Issues found: {len(results['issues'])}\")
        "
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: analysis-results
        path: analysis-results.json
    
    - name: Check for issues
      if: inputs.fail-on-issues == true
      run: |
        issues=$(python -c "import json; print(len(json.load(open('analysis-results.json'))['issues']))")
        if [ "$issues" -gt 0 ]; then
          echo "Found $issues issues. Failing..."
          exit 1
        fi
